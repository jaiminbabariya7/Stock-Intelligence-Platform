<svg viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, system-ui, sans-serif">
  <rect width="900" height="480" fill="#1e1e2e" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="17" font-weight="700" fill="#cdd6f4">Real-Time Stock Intelligence Platform — Architecture</text>

  <!-- Step boxes -->
  <!-- 1. Alpaca -->
  <rect x="20" y="80" width="130" height="70" rx="8" fill="#313244" stroke="#4f8ef7" stroke-width="1.5"/>
  <text x="85" y="108" text-anchor="middle" font-size="12" font-weight="700" fill="#4f8ef7">Alpaca Markets</text>
  <text x="85" y="125" text-anchor="middle" font-size="10" fill="#a6adc8">WebSocket Stream</text>
  <text x="85" y="140" text-anchor="middle" font-size="9" fill="#a6adc8">AAPL,TSLA,NVDA...</text>

  <!-- Arrow 1→2 -->
  <line x1="150" y1="115" x2="192" y2="115" stroke="#4f8ef7" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="171" y="108" text-anchor="middle" font-size="8" fill="#a6adc8">JSON ticks</text>

  <!-- 2. Ingestion -->
  <rect x="192" y="80" width="130" height="70" rx="8" fill="#313244" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="257" y="105" text-anchor="middle" font-size="12" font-weight="700" fill="#a6e3a1">alpaca_stream.py</text>
  <text x="257" y="122" text-anchor="middle" font-size="10" fill="#a6adc8">Reconnect logic</text>
  <text x="257" y="138" text-anchor="middle" font-size="10" fill="#a6adc8">SIGTERM handling</text>

  <!-- Arrow 2→3 -->
  <line x1="322" y1="115" x2="364" y2="115" stroke="#a6e3a1" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="343" y="108" text-anchor="middle" font-size="8" fill="#a6adc8">publish</text>

  <!-- 3. Pub/Sub -->
  <rect x="364" y="80" width="130" height="70" rx="8" fill="#313244" stroke="#f9e2af" stroke-width="1.5"/>
  <text x="429" y="105" text-anchor="middle" font-size="12" font-weight="700" fill="#f9e2af">Cloud Pub/Sub</text>
  <text x="429" y="122" text-anchor="middle" font-size="10" fill="#a6adc8">Topic: stock-price</text>
  <text x="429" y="138" text-anchor="middle" font-size="10" fill="#a6adc8">events</text>

  <!-- Arrow 3→4 -->
  <line x1="494" y1="115" x2="536" y2="115" stroke="#f9e2af" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="515" y="108" text-anchor="middle" font-size="8" fill="#a6adc8">subscribe</text>

  <!-- 4. Dataflow -->
  <rect x="536" y="60" width="145" height="110" rx="8" fill="#313244" stroke="#f7a44f" stroke-width="1.5"/>
  <text x="608" y="82" text-anchor="middle" font-size="12" font-weight="700" fill="#f7a44f">Apache Beam</text>
  <text x="608" y="97" text-anchor="middle" font-size="10" fill="#a6adc8">Cloud Dataflow</text>
  <line x1="550" y1="105" x2="667" y2="105" stroke="#45475a" stroke-width="0.5"/>
  <text x="608" y="120" text-anchor="middle" font-size="9" fill="#cdd6f4">&#8226; Parse &amp; Validate</text>
  <text x="608" y="134" text-anchor="middle" font-size="9" fill="#cdd6f4">&#8226; FixedWindows(10s)</text>
  <text x="608" y="148" text-anchor="middle" font-size="9" fill="#cdd6f4">&#8226; VWAP, Return, Vol</text>

  <!-- Arrow 4→5 -->
  <line x1="681" y1="115" x2="723" y2="115" stroke="#f7a44f" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="702" y="108" text-anchor="middle" font-size="8" fill="#a6adc8">write</text>

  <!-- 5. BigQuery -->
  <rect x="723" y="80" width="140" height="70" rx="8" fill="#313244" stroke="#4f8ef7" stroke-width="1.5"/>
  <text x="793" y="105" text-anchor="middle" font-size="12" font-weight="700" fill="#4f8ef7">BigQuery</text>
  <text x="793" y="122" text-anchor="middle" font-size="10" fill="#a6adc8">stock_data.stock</text>
  <text x="793" y="138" text-anchor="middle" font-size="10" fill="#a6adc8">_features</text>

  <!-- Arrow BigQuery down → ML -->
  <line x1="793" y1="150" x2="793" y2="218" stroke="#4f8ef7" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="808" y="185" font-size="8" fill="#a6adc8">query</text>

  <!-- ML Box -->
  <rect x="700" y="218" width="170" height="90" rx="8" fill="#313244" stroke="#cba6f7" stroke-width="1.5"/>
  <text x="785" y="240" text-anchor="middle" font-size="12" font-weight="700" fill="#cba6f7">ML Models (GCS)</text>
  <line x1="714" y1="250" x2="856" y2="250" stroke="#45475a" stroke-width="0.5"/>
  <text x="785" y="266" text-anchor="middle" font-size="9" fill="#cdd6f4">&#8226; ARIMA(5,1,0) — trend</text>
  <text x="785" y="280" text-anchor="middle" font-size="9" fill="#cdd6f4">&#8226; LSTM(128→64) — residuals</text>
  <text x="785" y="294" text-anchor="middle" font-size="9" fill="#cdd6f4">&#8226; Hybrid forecast</text>

  <!-- Arrow ML → BigQuery predictions -->
  <line x1="700" y1="260" x2="620" y2="260" stroke="#cba6f7" stroke-width="1.5" marker-end="url(#arr2)"/>
  <text x="660" y="252" text-anchor="middle" font-size="8" fill="#a6adc8">write preds</text>

  <!-- Predictions table -->
  <rect x="470" y="218" width="150" height="70" rx="8" fill="#313244" stroke="#4f8ef7" stroke-width="1.5"/>
  <text x="545" y="242" text-anchor="middle" font-size="11" font-weight="700" fill="#4f8ef7">BigQuery</text>
  <text x="545" y="258" text-anchor="middle" font-size="10" fill="#a6adc8">stock_predictions</text>
  <text x="545" y="274" text-anchor="middle" font-size="9" fill="#a6adc8">current + predicted price</text>

  <!-- Arrow predictions → Flask -->
  <line x1="470" y1="253" x2="390" y2="253" stroke="#4f8ef7" stroke-width="1.5" marker-end="url(#arr2)"/>
  <text x="430" y="245" text-anchor="middle" font-size="8" fill="#a6adc8">query</text>

  <!-- Flask -->
  <rect x="230" y="218" width="160" height="90" rx="8" fill="#313244" stroke="#f38ba8" stroke-width="1.5"/>
  <text x="310" y="240" text-anchor="middle" font-size="12" font-weight="700" fill="#f38ba8">Flask Dashboard</text>
  <text x="310" y="255" text-anchor="middle" font-size="9" fill="#a6adc8">Cloud Run (Docker)</text>
  <line x1="244" y1="262" x2="376" y2="262" stroke="#45475a" stroke-width="0.5"/>
  <text x="310" y="276" text-anchor="middle" font-size="9" fill="#cdd6f4">&#8226; Live price chart</text>
  <text x="310" y="290" text-anchor="middle" font-size="9" fill="#cdd6f4">&#8226; ML predictions table</text>
  <text x="310" y="304" text-anchor="middle" font-size="9" fill="#cdd6f4">&#8226; REST API (6 endpoints)</text>

  <!-- Arrow Flask → Browser -->
  <line x1="230" y1="263" x2="150" y2="263" stroke="#f38ba8" stroke-width="1.5" marker-end="url(#arr2)"/>

  <!-- Browser -->
  <rect x="20" y="228" width="130" height="70" rx="8" fill="#313244" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="85" y="252" text-anchor="middle" font-size="12" font-weight="700" fill="#a6e3a1">Browser UI</text>
  <text x="85" y="268" text-anchor="middle" font-size="10" fill="#a6adc8">Chart.js dashboard</text>
  <text x="85" y="284" text-anchor="middle" font-size="10" fill="#a6adc8">Auto-refresh 10s</text>

  <!-- Legend -->
  <rect x="20" y="380" width="860" height="80" rx="8" fill="#181825" stroke="#45475a" stroke-width="1"/>
  <text x="450" y="400" text-anchor="middle" font-size="11" font-weight="700" fill="#cdd6f4">Tech Stack</text>
  <text x="90"  y="425" text-anchor="middle" font-size="10" fill="#4f8ef7">&#8226; Python 3.11</text>
  <text x="200" y="425" text-anchor="middle" font-size="10" fill="#f9e2af">&#8226; GCP Pub/Sub</text>
  <text x="320" y="425" text-anchor="middle" font-size="10" fill="#f7a44f">&#8226; Apache Beam / Dataflow</text>
  <text x="470" y="425" text-anchor="middle" font-size="10" fill="#4f8ef7">&#8226; BigQuery</text>
  <text x="570" y="425" text-anchor="middle" font-size="10" fill="#cba6f7">&#8226; TensorFlow LSTM</text>
  <text x="700" y="425" text-anchor="middle" font-size="10" fill="#f38ba8">&#8226; Flask + Cloud Run</text>
  <text x="820" y="425" text-anchor="middle" font-size="10" fill="#a6e3a1">&#8226; Docker</text>
  <text x="280" y="448" text-anchor="middle" font-size="10" fill="#a6adc8">Data Source: Alpaca Markets WebSocket</text>
  <text x="600" y="448" text-anchor="middle" font-size="10" fill="#a6adc8">ML: ARIMA(5,1,0) + Stacked LSTM (128&#8594;64&#8594;Dense)</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arr"  markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4f8ef7"/>
    </marker>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#cba6f7"/>
    </marker>
  </defs>
</svg>